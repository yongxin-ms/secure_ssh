name: Lint
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell formatting
        run: shfmt -d -i 2 -ci **/*.sh
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
